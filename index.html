<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook Digital Laboratorium</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🖥️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.8.0/countUp.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">⚗️</div>
        <div>
          <div class="brand-name">Logbook Digital</div>
          <div class="brand-sub">Laboratorium Teknik Elektro &amp; Komputer</div>
        </div>
      </div>
      <a class="cta-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeu1wPsYvgN12SLcOnpelaB84S11ePG_kxBlWghx_5XeTL9Xw/viewform?usp=header" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Isi Logbook
      </a>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <section class="stats-section">
      <div class="stat-card" id="card-today">
        <div class="stat-label">Hari Ini</div>
        <div class="stat-num" id="today-counter">0</div>
        <div class="stat-desc">pengunjung</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-today"></div></div>
      </div>
      <div class="stat-card" id="card-month">
        <div class="stat-label">Bulan Ini</div>
        <div class="stat-num" id="month-counter">0</div>
        <div class="stat-desc">pengunjung</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-month"></div></div>
      </div>
      <div class="stat-card" id="card-year">
        <div class="stat-label">Tahun Ini</div>
        <div class="stat-num" id="year-counter">0</div>
        <div class="stat-desc">pengunjung</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-year"></div></div>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls-section">
      <div class="controls-left">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Cari nama, NPM, aktivitas...">
        </div>
        <div class="select-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
          <select id="lokasi-filter">
            <option value="all">Semua Lokasi</option>
          </select>
        </div>
      </div>
      <div class="controls-right">
        <button class="icon-btn" id="refresh-btn" title="Refresh Data">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refresh
        </button>
        <button class="icon-btn secondary" id="print-pdf-btn" title="Cetak PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Cetak PDF
        </button>
      </div>
    </section>

    <!-- Table -->
    <section class="table-section">
      <div class="table-meta">
        <span id="data-count">— entri</span>
      </div>
      <div class="table-wrap">
        <table id="logbook-table">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Nama</th>
              <th>NPM / NIP</th>
              <th>Tanggal</th>
              <th>Aktivitas / Keperluan</th>
              <th>Keterangan</th>
              <th>Lokasi</th>
            </tr>
          </thead>
          <tbody id="logbook-body">
            <tr class="loading-row">
              <td colspan="7">
                <div class="loader-wrap">
                  <div class="spinner"></div>
                  <span>Memuat data...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prev-page" class="page-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span id="page-info">1 / 1</span>
        <button id="next-page" class="page-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </section>
  </main>

  <footer>
    <span>© <span id="year"></span> Laboratorium Teknik Elektro dan Komputer</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
